name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t one-piece-app .

      - name: Push sur Docker Hub
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker tag one-piece-app ${{ secrets.DOCKER_USERNAME }}/one-piece-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/one-piece-app:latest

      - name: Déployer sur le VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/one-piece-app:latest
            docker stop one-piece-app || true
            docker run -d --rm -p 80:80 --name one-piece-app \
              ${{ secrets.DOCKER_USERNAME }}/one-piece-app:latest