<div class="form-card">
  <h2>Connectez-vous</h2>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmitForm()">

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" formControlName="email">
      <span class="error-msg" *ngIf="emailInvalid">
        Email invalide.
      </span>
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" formControlName="password">
      <span class="error-msg" *ngIf="passwordInvalid">
        Mot de passe requis (6 caractères minimum).
      </span>
    </div>

    <span class="error-msg" *ngIf="error">{{ error }}</span>

    <div class="action-buttons">
      <button type="submit" [disabled]="loginForm.invalid || loading">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </div>

  </form>
</div>
